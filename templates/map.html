<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Map - Admin Panel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; }
    .header { background: #1a1a2e; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h2 { margin: 0; }
    .btn { color: white; text-decoration: none; background: #0d6efd; padding: 8px 15px; border-radius: 5px; }
    .btn:hover { background: #0b5ed7; }
    #adminMap { height: calc(100vh - 65px); width: 100%; }
</style>
</head>
<body>

<div class="header">
    <h2><i class="bi bi-geo-alt"></i> Live Complaint Hotspots</h2>
    <a href="/admin" class="btn">Back to Dashboard</a>
</div>

<div id="adminMap"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('adminMap').setView([28.6139, 77.2090], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    var complaints = {{ complaints | tojson | safe }};

    // Define icons
    var redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    var greenIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    var goldIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // Add markers
    var bounds = [];
    complaints.forEach(function(c) {
        if (c.lat && c.lng && c.status !== 'Duplicate') {
            console.log(c);
            let iconToUse = goldIcon; // Pending normal
            if (c.status === 'Resolved') { iconToUse = greenIcon; }
            else if (c.priority === 'High') { iconToUse = redIcon; }

            let popupContent = `<b>ID #${c.id} - ${c.category}</b><br>${c.location}<br><i>${c.status}</i>`;
            let marker = L.marker([c.lat, c.lng], {icon: iconToUse}).addTo(map)
                .bindPopup(popupContent);
            bounds.push([c.lat, c.lng]);
        }
    });

    if (bounds.length > 0) {
        map.fitBounds(bounds);
    } else {
        // Fallback to geolocation
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                map.setView([position.coords.latitude, position.coords.longitude], 12);
            });
        }
    }
</script>

</body>
</html>
