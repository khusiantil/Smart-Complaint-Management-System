<!DOCTYPE html>
<html>
<head>
<title>Reports & Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 30px 0;
    }
    .container {
        background: white;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h2 {
        color: #1e3c72;
        font-weight: bold;
        margin-bottom: 30px;
        text-align: center;
    }
    .stats-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
        text-align: center;
    }
    .stats-card h5 {
        font-size: 14px;
        opacity: 0.9;
        margin-bottom: 10px;
    }
    .stats-card .value {
        font-size: 32px;
        font-weight: bold;
    }
    .chart-container {
        position: relative;
        height: 300px;
        margin: 30px 0;
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn-back {
        background: #1e3c72;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
        transition: 0.3s;
    }
    .btn-back:hover {
        background: #0f193d;
        color: white;
    }
</style>
</head>
<body>

<div class="container mt-5">
    <h2>📊 Complaint Reports & Analytics</h2>
    
    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="stats-card">
                <h5>Total Complaints</h5>
                <div class="value">{{total}}</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <h5>Pending</h5>
                <div class="value">{{pending}}</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <h5>Resolved</h5>
                <div class="value">{{resolved}}</div>
            </div>
        </div>
    </div>

    <!-- Bar Chart -->
    <div class="chart-container">
        <canvas id="statsChart"></canvas>
    </div>

    <!-- Pie Chart -->
    <div class="chart-container">
        <canvas id="statusPieChart"></canvas>
    </div>

    <div style="text-align: center;">
        <a href="/admin" class="btn-back">← Back to Dashboard</a>
    </div>
</div>

<script>
    // Bar Chart
    const barCtx = document.getElementById('statsChart').getContext('2d');
    new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: ['Total', 'Pending', 'Resolved'],
            datasets: [{
                label: 'Complaint Status',
                data: [{{total}}, {{pending}}, {{resolved}}],
                backgroundColor: [
                    'rgba(102, 126, 234, 0.8)',
                    'rgba(245, 87, 108, 0.8)',
                    'rgba(79, 172, 254, 0.8)'
                ],
                borderColor: [
                    'rgba(102, 126, 234, 1)',
                    'rgba(245, 87, 108, 1)',
                    'rgba(79, 172, 254, 1)'
                ],
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true,
                    labels: {
                        font: { size: 14, weight: 'bold' }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { font: { size: 12 } }
                },
                x: {
                    ticks: { font: { size: 12 } }
                }
            }
        }
    });

    // Pie Chart
    const pieCtx = document.getElementById('statusPieChart').getContext('2d');
    new Chart(pieCtx, {
        type: 'doughnut',
        data: {
            labels: ['Pending', 'Resolved'],
            datasets: [{
                data: [{{pending}}, {{resolved}}],
                backgroundColor: [
                    'rgba(245, 87, 108, 0.8)',
                    'rgba(79, 172, 254, 0.8)'
                ],
                borderColor: [
                    'rgba(245, 87, 108, 1)',
                    'rgba(79, 172, 254, 1)'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true,
                    position: 'bottom',
                    labels: {
                        font: { size: 14, weight: 'bold' },
                        padding: 20
                    }
                }
            }
        }
    });
</script>

</body>
</html>
